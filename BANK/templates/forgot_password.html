<body>
<div class="box">
    <h2>Forgot Password</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="text" name="account_number" placeholder="Account Number" required>
        <input type="text" name="id_number" placeholder="ID Number" required>
        <div class="password-wrapper">
            <input type="password" id="password" name="new_password" placeholder="New Password" required>
            <span class="toggle-eye" onclick="togglePassword('password', this)">👁</span>
        </div>

        <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
            <span class="toggle-eye" onclick="togglePassword('confirm_password', this)">👁</span>
        </div>
        <button type="submit">Reset Password</button>
    </form>

    <!-- Back button -->
    <div style="margin-top: 15px; text-align: center;">
        <button class="small-btn" onclick="window.location.href='{{ url_for('home') }}'">Back to Login</button>
    </div>
</div>

{% if message %}
<div class="popup-overlay">
    <div class="popup-box">
        <p>{{ message }}</p>
        <button onclick="redirectToLogin()">OK</button>
    </div>
</div>
{% endif %}

<script>
function redirectToLogin() {
    window.location.href = "{{ url_for('home') }}";
}
</script>

<style>
body {
    background: #0b0f0c;
    color: #e0ffe6;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: #000;
    padding: 30px;
    width: 320px;
    border-radius: 10px;
    border: 1px solid #00c853;
}
h2 {
    color: #00c853;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}
button {
    width: 100%;
    padding: 12px;
    background: #00c853;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}
button:hover {
    background: #00e676;
}
.small-btn {
    width: auto;
    padding: 6px 15px;
    font-size: 14px;
    background: #00c853;
    color: #000;
    font-weight: bold;
    border-radius: 5px;
}
.small-btn:hover {
    background: #00e676;
}
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.popup-box {
    background: #0b0f0c;
    border: 2px solid #00c853;
    padding: 25px 30px;
    border-radius: 10px;
    text-align: center;
    color: #e0ffe6;
    width: 300px;
}
.popup-box button {
    margin-top: 15px;
    padding: 8px 20px;
    background: #00c853;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}
.popup-box button:hover {
    background: #00e676;
}
/* ===== PASSWORD TOGGLE FIX ===== */
.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper input {
    width: 100%;
    padding: 10px 40px 10px 10px;
    box-sizing: border-box;
}

.toggle-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #00c853;
    user-select: none;
}

.toggle-eye:hover {
    color: #00e676;
}
</style>
<script>
    function togglePassword(id, icon) {
        const input = document.getElementById(id);

        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "🙈";
        } else {
            input.type = "password";
            icon.textContent = "👁";
        }
    }
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carrick Bank | Sign Up</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f0c;
            color: #e0ffe6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .signup-container {
            background: #000;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            border: 1px solid #00c853;
        }

        h2 {
            text-align: center;
            color: #00c853;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #00c853;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #00e676;
        }

        .back {
            text-align: center;
            margin-top: 16px;
        }

        .back a {
            color: #00c853;
            text-decoration: none;
        }
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .popup-box {
            background: #0b0f0c;
            border: 2px solid #00c853;
            padding: 25px 30px;
            border-radius: 10px;
            text-align: center;
            color: #e0ffe6;
            width: 300px;
        }       

        .popup-box button {
            margin-top: 15px;
            padding: 8px 20px;
            background: #00c853;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .popup-box button:hover {
            background: #00e676;
        }
        /* ===== PASSWORD TOGGLE ===== */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            width: 100%;
            padding: 10px 40px 10px 10px;
            box-sizing: border-box;
        }

        .toggle-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #00c853;
            user-select: none;
        }

        .toggle-eye:hover {
            color: #00e676;
        }
    </style>
</head>
<body>

  <div class="signup-container">
      <h2>Create Account</h2>

     <form method="POST" action="{{ url_for('signup') }}">
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
        <input type="text" name="id_number" placeholder="ID Number(8 digits)" pattern="[0-9]{8}" maxlength="8" required>
        <input type="text" name="username" placeholder="Username" required>
        <select name="account_type" required>
            <option selected disabled>Select Account Type</option>
            <option>Savings Account</option>
            <option>Current Account</option>
            <option>Student Account</option>
        </select>
        <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span class="toggle-eye" onclick="togglePassword('password', this)">👁</span>
        </div>

        <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
            <span class="toggle-eye" onclick="togglePassword('confirm_password', this)">👁</span>
        </div>

        <!-- Submit button -->
        <button class="btn" type="submit">Create Account</button>
        </form>

        <!-- Back link goes to login page -->
        <div class="back">
            <a href="{{ url_for('admin_dashboard') }}">back </a>
        </div>

    </div>
    {% if message %}
    <div class="popup-overlay">
        <div class="popup-box">
            <p>{{ message }}</p>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>
    {% endif %}
    <script>
        function closePopup() {
            const popup = document.querySelector('.popup-overlay');
            if (popup) popup.style.display = 'none';
        }
    </script>
    <script>
    function togglePassword(id, icon) {
        const input = document.getElementById(id);

        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "🙈";
        } else {
            input.type = "password";
            icon.textContent = "👁";
        }
    }
</script>
</body>
</html>
